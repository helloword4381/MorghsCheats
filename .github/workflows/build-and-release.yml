name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          自动生成的 Release 版本 ${{ github.ref }}
          
          请手动下载源代码编译后，将 DLL 文件上传到本 Release。
          
          ## 编译说明
          1. 克隆本仓库
          2. 使用 Visual Studio 打开项目
          3. 修改 .csproj 中的游戏路径
          4. 编译 Release 版本
          5. 将生成的 DLL 上传到本 Release
        draft: false
        prerelease: false
        
    - name: Upload Source Zip
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./MorghsCheats-NEW-qikan-1.3.15/MorghsCheats.csproj
        asset_name: MorghsCheats.csproj
        asset_content_type: application/xml
