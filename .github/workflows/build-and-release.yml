name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      
    - name: Restore packages
      run: |
        nuget restore MorghsCheats-NEW-qikan-1.3.15/MorghsCheats.csproj
      working-directory: .
      
    - name: Build solution
      run: |
        msbuild MorghsCheats-NEW-qikan-1.3.15/MorghsCheats.csproj /p:Configuration=Release /p:Platform="Any CPU"
      working-directory: .
      
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
        
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./MorghsCheats-NEW-qikan-1.3.15/bin/Win64_Shipping_Client/MorghsCheats.dll
        asset_name: MorghsCheats.dll
        asset_content_type: application/octet-stream
